<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель партнёра — DC Bots</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #5a67d8; margin-bottom: 30px; }
        .card { background: #141414; border: 1px solid #2a2a2a; border-radius: 16px; padding: 24px; margin-bottom: 30px; }
        input, button { padding: 12px; border-radius: 8px; font-size: 14px; }
        input { background: #0a0a0a; border: 1px solid #2a2a2a; color: white; flex: 1; }
        button { background: #5a67d8; color: white; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { background: #6c63ff; transform: translateY(-2px); }
        .link-box { display: flex; gap: 10px; margin: 15px 0; }
        .generated-link { background: #0a0a0a; padding: 15px; border-radius: 8px; margin-top: 15px; word-break: break-all; }
        .generated-link a { color: #5a67d8; }
        .status { padding: 10px; border-radius: 8px; margin-top: 15px; }
        .status.success { background: rgba(72,187,120,0.2); color: #48bb78; }
        .status.error { background: rgba(229,62,62,0.2); color: #e53e3e; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2a2a2a; }
        th { color: #5a67d8; }
        .refresh-btn { margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🤝 Панель управления партнёрской программой</h1>

    <div class="card">
        <h3>🔗 Создать партнёрскую ссылку</h3>
        <div class="link-box">
            <input type="text" id="partnerId" placeholder="ID партнёра (например: ivan123)" autocomplete="off">
            <button onclick="generateLink()">Создать ссылку</button>
        </div>
        <div id="generatedLink" class="generated-link" style="display: none;"></div>
        <div id="linkStatus" class="status"></div>
    </div>

    <div class="card">
        <h3>📊 Статистика переходов</h3>
        <button onclick="loadStats()" class="refresh-btn" style="margin-bottom: 15px;">🔄 Обновить статистику</button>
        <div id="statsTable">
            <p style="color: #a0a0a0; text-align: center; padding: 20px;">Нажмите "Обновить статистику", чтобы загрузить данные</p>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyxhRyAuJgmjThz6lkh7V9ieVLjebNw2ax_NXbIOSZznwmSB9GwSq9b2zLZtBP7JHEJKA/exec';
    const SPREADSHEET_ID = 'ТВОЙ_ID_ТАБЛИЦЫ'; // ЗАМЕНИТЕ НА ID ВАШЕЙ ТАБЛИЦЫ

    function generateLink() {
        const partnerId = document.getElementById('partnerId').value.trim();
        const statusDiv = document.getElementById('linkStatus');
        const generatedDiv = document.getElementById('generatedLink');

        if (!partnerId) {
            statusDiv.className = 'status error';
            statusDiv.textContent = '❌ Введите ID партнёра';
            setTimeout(() => statusDiv.style.display = 'none', 3000);
            return;
        }

        const link = `https://www.dsbot.su/?ref=${encodeURIComponent(partnerId)}`;
        generatedDiv.innerHTML = `
            <strong>✨ Ваша партнёрская ссылка:</strong><br>
            <a href="${link}" target="_blank">${link}</a><br>
            <small style="color:#6c6c6c;">Передайте эту ссылку партнёру. Все переходы будут отслеживаться.</small>
        `;
        generatedDiv.style.display = 'block';
        statusDiv.className = 'status success';
        statusDiv.textContent = '✅ Ссылка создана и скопирована!';
        setTimeout(() => statusDiv.style.display = 'none', 3000);

        navigator.clipboard.writeText(link);
    }

    async function loadStats() {
        const tableDiv = document.getElementById('statsTable');
        tableDiv.innerHTML = '<p style="color: #a0a0a0; text-align: center; padding: 20px;">Загрузка статистики...</p>';
        
        try {
            // ВАЖНО: Этот запрос сработает только после того, как вы обновите код Apps Script.
            // Сейчас он может не работать. Мы вернёмся к нему после настройки скрипта.
            const url = `https://script.google.com/macros/s/AKfycbyxhRyAuJgmjThz6lkh7V9ieVLjebNw2ax_NXbIOSZznwmSB9GwSq9b2zLZtBP7JHEJKA/exec?key=ТВОЙ_СЕКРЕТНЫЙ_КЛЮЧ`;
            const response = await fetch(url);
            const result = await response.json();
            
            if (result.data && result.data.length > 1) {
                const rows = result.data.slice(1).reverse();
                let html = '<table><thead><tr><th>Дата</th><th>IP</th><th>Партнёр</th><th>Страница</th><th>Гео</th></tr></thead><tbody>';
                for (const row of rows.slice(0, 50)) {
                    html += `<tr><td>${row[0] || ''}</td><td>${row[1] || ''}</td><td><strong>${row[2] || ''}</strong></td><td>${row[3] || ''}</td><td>${row[5] || ''}</td></tr>`;
                }
                html += '</tbody></table>';
                tableDiv.innerHTML = html;
            } else {
                tableDiv.innerHTML = '<p style="color: #a0a0a0; text-align: center; padding: 20px;">📭 Пока нет переходов</p>';
            }
        } catch (error) {
            console.error("Ошибка загрузки:", error);
            tableDiv.innerHTML = '<p style="color: #e53e3e; text-align: center; padding: 20px;">❌ Ошибка загрузки статистики. Возможно, скрипт ещё не обновлён.</p>';
        }
    }
</script>
</body>
</html>
